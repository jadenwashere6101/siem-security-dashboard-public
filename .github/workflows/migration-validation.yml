# Migration safety and chain integrity (SPEC-SCHEMA-001 / harden-migration-deployment-workflow).
# Slice 1: numbering validation, destructive SQL lint, pytest, fresh DB apply, post-apply dry-run.
name: Migration validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration-validation:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CI_DATABASE_NAME: siem_migration_ci
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/siem_migration_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          python3 -m pip install --disable-pip-version-check pyyaml -q
          python3 - <<'PY'
          import yaml
          from pathlib import Path

          path = Path(".github/workflows/migration-validation.yml")
          yaml.safe_load(path.read_text(encoding="utf-8"))
          print(f"Workflow YAML OK: {path}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python3 -m pip install --disable-pip-version-check -r requirements.txt

      - name: Lint migration SQL for prohibited destructive patterns
        run: |
          set -euo pipefail
          shopt -s nocasematch

          # Guarded DROP CONSTRAINT inside DO $$ ... $$ blocks (e.g. approval target_check
          # refinement) is intentionally allowed. This lint targets broad destructive DDL/DML
          # only; it does not match bare "DROP CONSTRAINT" lines.
          prohibited_patterns=(
            'DROP[[:space:]]+TABLE'
            'TRUNCATE'
            'DELETE[[:space:]]+FROM'
            'DROP[[:space:]]+COLUMN'
            'ALTER[[:space:]]+COLUMN[[:space:]]+TYPE'
            'RENAME[[:space:]]+COLUMN'
          )

          violations=0
          for migration_file in migrations/*.sql; do
            [[ -f "$migration_file" ]] || continue
            for pattern in "${prohibited_patterns[@]}"; do
              if grep -qiE "$pattern" "$migration_file"; then
                echo "::error file=${migration_file}::Prohibited pattern matched: ${pattern}"
                violations=$((violations + 1))
              fi
            done
          done

          if [[ "$violations" -gt 0 ]]; then
            echo "Migration SQL lint failed with ${violations} violation(s)."
            exit 1
          fi
          echo "Migration SQL lint passed for migrations/*.sql"

      - name: Validate migration numbering and filename sequence
        run: |
          python3 - <<'PY'
          from pathlib import Path

          from scripts import migrate

          migrations = migrate.discover_migrations(Path("migrations"))
          highest = migrations[-1].version
          print(
              f"Migration numbering OK: {len(migrations)} file(s), "
              f"contiguous 0001..{highest:04d}"
          )
          for migration in migrations:
              print(f"  - {migration.filename}")
          PY

      - name: Compile migration runner
        run: python3 -m py_compile scripts/migrate.py

      - name: Run migration unit tests
        run: python3 -m pytest tests/test_schema_migrations.py -v

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create disposable PostgreSQL database
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -v ON_ERROR_STOP=1 \
            -c "DROP DATABASE IF EXISTS ${CI_DATABASE_NAME};"
          psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres \
            -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE ${CI_DATABASE_NAME};"

      - name: Apply full migration chain to disposable database
        run: |
          set -euo pipefail
          python3 scripts/migrate.py --db-url "$DATABASE_URL"

      - name: Verify post-apply dry-run reports no pending migrations
        run: |
          set -euo pipefail
          output="$(python3 scripts/migrate.py --db-url "$DATABASE_URL" --dry-run 2>&1)"
          printf '%s\n' "$output"
          if ! grep -q "Nothing to apply" <<<"$output"; then
            echo "::error::Post-apply dry-run did not report 'Nothing to apply'."
            exit 1
          fi
          if grep -qi "Would apply migration" <<<"$output"; then
            echo "::error::Post-apply dry-run still lists pending migrations."
            exit 1
          fi
          echo "Post-apply dry-run OK: migration chain fully applied."
